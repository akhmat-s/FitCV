[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-q"
# Async backend: pytest-asyncio auto-mode collects every `async def test_*` with no
# per-test decorator. Unit/integration tests that call the now-async pipeline await it
# directly; TestClient-based endpoint tests stay sync (TestClient drives the async app).
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
target-version = "py311"
line-length = 100
src = [".", "helprers", "tests"]

[tool.ruff.lint]
# pyflakes (F), pycodestyle (E/W), isort (I), pyupgrade (UP), bugbear (B)
select = ["E", "F", "W", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# Tests may use assert and re-import fixtures freely.
"tests/*" = ["B011"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI uses callables (File/Form/Depends) as argument defaults by design (B008 exception).
extend-immutable-calls = ["fastapi.File", "fastapi.Form", "fastapi.Depends", "fastapi.Query"]
